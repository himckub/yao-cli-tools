<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>toktra</title>
  <link rel="stylesheet" href="ui.css">
</head>
<body class="toktra-popup">
  <main class="popup-shell">
    <header class="popup-header">
      <div>
        <h1>toktra</h1>
        <p id="domain">当前页面</p>
      </div>
      <span id="stateBadge" class="status" data-tone="idle">读取中</span>
    </header>
    <section class="quick-panel" aria-label="快捷翻译设置">
      <div class="quick-panel__header">
        <span class="quick-panel__title">翻译设置</span>
        <span class="quick-panel__meta">快捷</span>
      </div>
      <div class="quick-panel__body">
        <div class="language-row">
        <label class="language-card">
          <span class="control-label">原文语言</span>
          <select id="sourceLanguage">
            <option value="auto">自动检测</option>
            <option value="en">English</option>
          </select>
        </label>
        <span class="language-arrow" aria-hidden="true">→</span>
        <label class="language-card">
          <span class="control-label">目标语言</span>
          <select id="targetLanguage">
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
          </select>
        </label>
      </div>
      <label class="model-row">
        <span class="control-label">翻译模型</span>
        <select id="modelSelect">
          <option value="gpt-4.1-mini">GPT-4.1 mini</option>
          <option value="gpt-4.1">GPT-4.1</option>
          <option value="deepseek-v4-flash">DeepSeek-V4-Flash</option>
        </select>
      </label>
      <div class="switch-grid">
      <label class="switch-row">
        <span class="switch-label">AI 精翻</span>
        <input id="preciseTranslation" class="switch-input" type="checkbox">
        <span class="switch-track" aria-hidden="true"></span>
      </label>
      <label class="switch-row">
        <span class="switch-label">划词翻译</span>
        <input id="selectionTranslation" class="switch-input" type="checkbox">
        <span class="switch-track" aria-hidden="true"></span>
      </label>
      </div>
      </div>
    </section>
    <div class="popup-actions">
      <button id="translateNow" type="button">手动翻译当前页</button>
      <button id="setManualMode" type="button" class="secondary">手动模式</button>
      <button id="setSiteAutoMode" type="button" class="secondary">仅此网站自动翻译</button>
      <button id="setGlobalAutoMode" type="button" class="secondary">所有网站自动翻译</button>
      <button id="openOptions" type="button" class="secondary">设置 API</button>
    </div>
    <p id="message" class="message"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
