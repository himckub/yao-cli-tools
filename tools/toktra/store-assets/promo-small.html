<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>toktra promo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 440px;
      height: 280px;
      overflow: hidden;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f3329;
      background: #f6f5f1;
    }
    .wrap {
      display: grid;
      grid-template-columns: 122px 1fr;
      gap: 24px;
      height: 100%;
      padding: 42px 34px;
      align-items: center;
    }
    .icon {
      display: grid;
      place-items: center;
      width: 112px;
      height: 112px;
      border-radius: 22px;
      background: #2f7a59;
      color: white;
      font-size: 76px;
      line-height: 1;
      font-weight: 900;
      box-shadow: 0 18px 38px rgba(47,122,89,.28);
    }
    h1 {
      margin: 0 0 12px;
      color: #245941;
      font-size: 44px;
      line-height: 1;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: #4d5b53;
      font-size: 22px;
      line-height: 1.34;
      font-weight: 700;
    }
    .bar {
      width: 178px;
      height: 10px;
      margin-top: 20px;
      background: #2f7a59;
      border-radius: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">t</div>
    <div>
      <h1>toktra</h1>
      <p>Inline English to Chinese translation for webpages and PDFs.</p>
      <div class="bar"></div>
    </div>
  </div>
</body>
</html>
